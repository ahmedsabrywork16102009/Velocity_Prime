<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Velocity Prime</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <!-- MAIN VIEW -->
  <div id="main-view">

    <!-- Logo and Name of App only -->
    <div class="logo-container">
      <img src="/assets/icons/icon48.png" alt="Logo">
      <h1>Velocity Prime</h1>
    </div>

    <!-- Hidden speed value for JS -->
    <span id="speed-val" style="display:none">1.0</span>

    <!-- SPEED DISPLAY -->
    <div class="speed-control-widget">
      <button id="speed-down-btn" class="speed-btn" title="Decrease speed">−</button>
      <div class="speed-input-wrapper">
        <input type="number" id="current-speed-input" class="speed-display" min="0" max="16" step="0.1" value="1.0">
        <span class="speed-unit">×</span>
      </div>
      <button id="speed-up-btn" class="speed-btn" title="Increase speed">+</button>
    </div>

    <!-- SLIDER -->
    <div class="slider-section">
      <input type="range" id="main-slider" min="0" max="16.0" step="0.1" value="1.0">
    </div>

    <!-- Speed Buttons -->
    <div class="presets-grid">
      <button class="preset-btn" data-speed="0.5">0.5×</button>
      <button class="preset-btn active" data-speed="1.0">1×</button>
      <button class="preset-btn" data-speed="1.5">1.5×</button>
      <button class="preset-btn" data-speed="2.0">2×</button>
      <button class="preset-btn" data-speed="3.0">3×</button>
      <button class="preset-btn" data-speed="4.0">4×</button>
      <button class="preset-btn" data-speed="6.0">6×</button>
      <button class="preset-btn" data-speed="8.0">8×</button>
      <button class="preset-btn" data-speed="10.0">10×</button>
      <button class="preset-btn danger" data-speed="16.0">🔥 16×</button>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
