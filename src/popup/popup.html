<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Velocity Prime</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="css/popup.css">
    </head>
    <body>
        <!-- MAIN VIEW -->
        <div id="main-view">

            <!-- Header: Logo + App Name -->
            <div class="logo-container">
                <img src="/assets/icons/icon48.png" alt="Velocity Prime Logo">
                <h1>Velocity Prime</h1>
            </div>

            <!-- Tab Navigation -->
            <div class="tabs-container">
                <button class="tab-btn active" data-tab="speed-tab">Speed Control</button>
                <button class="tab-btn" data-tab="downloads-tab">Downloads</button>
            </div>

            <!-- Server status bar (visible only on Downloads tab) -->
            <div id="server-status-bar" class="server-status-bar hidden">
                <span id="server-status-dot" class="status-dot offline"></span>
                <span id="server-status-text">Checking server...</span>
                <button id="server-retry-btn" class="server-retry-btn hidden">Retry</button>
            </div>

            <!-- ── SPEED TAB ─────────────────────────────────── -->
            <div id="speed-tab" class="tab-pane active">
                <!-- Hidden speed value used by content script bridge -->
                <span id="speed-val" style="display:none">1.0</span>

                <!-- +/− Speed Controls + Big Number Display -->
                <div class="speed-control-widget">
                    <button id="speed-down-btn" class="speed-btn" title="Decrease speed">−</button>
                    <div class="speed-input-wrapper">
                        <input type="number" id="current-speed-input" class="speed-display"
                               min="0" max="16" step="0.05" value="1.0">
                        <span class="speed-unit">×</span>
                    </div>
                    <button id="speed-up-btn" class="speed-btn" title="Increase speed">+</button>
                </div>

                <!-- Slider -->
                <div class="slider-section">
                    <input type="range" id="main-slider" min="0" max="16.0" step="0.05" value="1.0">
                </div>

                <!-- Preset Speed Buttons -->
                <div class="presets-grid">
                    <button class="preset-btn" data-speed="0.5">0.5×</button>
                    <button class="preset-btn active" data-speed="1.0">1×</button>
                    <button class="preset-btn" data-speed="1.5">1.5×</button>
                    <button class="preset-btn" data-speed="2.0">2×</button>
                    <button class="preset-btn" data-speed="3.0">3×</button>
                    <button class="preset-btn" data-speed="4.0">4×</button>
                    <button class="preset-btn" data-speed="6.0">6×</button>
                    <button class="preset-btn" data-speed="8.0">8×</button>
                    <button class="preset-btn" data-speed="10.0">10×</button>
                    <button class="preset-btn danger" data-speed="16.0">🔥 16×</button>
                </div>
            </div>

            <!-- ── DOWNLOADS TAB ──────────────────────────────── -->
            <div id="downloads-tab" class="tab-pane hidden">

                <!-- Empty state: shown when not on a video/playlist page -->
                <div id="no-video-state" class="no-video-state hidden">
                    <div class="no-video-icon">🎬</div>
                    <p class="no-video-msg">Navigate to a video or playlist page to start downloading.</p>
                </div>

                <!-- Download form: shown when a video/playlist is detected -->
                <div id="download-panel" class="download-panel hidden">

                    <!-- Thumbnail -->
                    <div class="thumbnail-container">
                        <img id="video-thumbnail" src="" alt="Video Thumbnail" class="thumbnail-img">
                        <div id="playlist-badge" class="playlist-badge hidden">
                            <span>📋</span>
                            <span id="playlist-badge-text">Playlist</span>
                        </div>
                    </div>

                    <!-- Video Name Input -->
                    <div class="input-group" id="video-name-group">
                        <label for="video-name">Video Name</label>
                        <input type="text" id="video-name" class="modern-input" placeholder="Enter video name...">
                    </div>

                    <!-- Quality Selector -->
                    <div class="input-group">
                        <label>Quality</label>
                        <div class="custom-select" id="quality-selector">
                            <div class="select-selected" id="quality-selected">720p (HD)</div>
                            <div class="select-items hidden" id="quality-items">
                                <div data-value="1080">1080p (Full HD)</div>
                                <div data-value="720" class="same-as-selected">720p (HD)</div>
                                <div data-value="480">480p</div>
                                <div data-value="360">360p</div>
                                <div data-value="audio">Audio Only</div>
                            </div>
                        </div>
                        <input type="hidden" id="video-quality" value="720">
                    </div>

                    <!-- Single video download button -->
                    <button id="start-download-btn" class="download-submit-btn hidden" data-video-url="">
                        ⬇️ Start Download
                    </button>

                    <!-- Playlist download button (playlist pages only) -->
                    <button id="download-playlist-btn" class="download-submit-btn playlist-btn hidden">
                        📋 Download Playlist
                    </button>
                </div>

                <!-- Active Downloads Section -->
                <h3 class="section-title">Active Downloads</h3>
                <div id="active-downloads-list" class="active-downloads">
                    <!-- Download cards injected dynamically by downloads.js -->
                </div>
            </div>

        </div>

        <script type="module" src="js/main.js"></script>
    </body>
</html>
